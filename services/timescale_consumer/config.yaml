# TimescaleDB Consumer Service Configuration

# Kafka Configuration
kafka:
  consumer_group: "timescaledb_consumer_group"
  topic: "market_data"
  auto_offset_reset: "earliest"
  enable_auto_commit: true
  max_poll_records: 100

# Database Configuration
database:
  table: "market_data_hot"
  batch_size: 100  # Insert 100 records at once
  batch_timeout: 1.0  # Flush every 1 second
  connection_pool_size: 5
  retry_attempts: 3
  retry_delay: 5  # seconds

# Performance Settings
performance:
  commit_interval: 5  # Commit offset every 5 seconds
  flush_interval: 1  # Flush to DB every 1 second

# Error Handling
error_handling:
  max_consecutive_errors: 10
  backoff_multiplier: 2
  max_backoff_seconds: 300  # 5 minutes

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
