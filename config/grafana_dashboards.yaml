# Grafana Dashboard Provisioning
# Auto-loads all dashboard JSON files on startup

apiVersion: 1

providers:
  - name: 'Finstock Dashboards'
    orgId: 1
    folder: 'Finstock Trading'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
