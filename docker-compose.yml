# Named volumes for persistent storage
volumes:
  minio_data:
    driver: local
  postgres_data:
    driver: local
  # redis_data:
  #   driver: local
  # spark_logs:
  #   driver: local
  grafana_data:
    driver: local
  # prometheus_data:
  #   driver: local
  zookeeper_data:
    driver: local
  zookeeper_logs:
    driver: local
  kafka_data:
    driver: local
  # superset_home:
  #   driver: local

# Custom network for service communication
networks:
  finstock_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16