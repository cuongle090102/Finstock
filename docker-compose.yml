# Delta Lake Storage with MinIO Configuration - Task 1.6
# Comprehensive setup for Finstock data lake infrastructure

version: '3.8'

services:
  # MinIO Object Storage for Delta Lake
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: finstock-minio
    restart: unless-stopped
    ports:
      - "9000:9000"     # MinIO API
      - "9001:9001"     # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-finstock_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_CONSOLE_ADDRESS: ":9001"
      MINIO_SERVER_URL: "http://localhost:9000"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - finstock_network
    healthcheck:
      test: ["CMD", "timeout", "5s", "bash", "-c", ":> /dev/tcp/127.0.0.1/9000 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 40s

  # MinIO Client for bucket initialization
  minio-init:
    image: minio/mc:RELEASE.2024-01-13T08-44-48Z
    container_name: finstock-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_minio: "http://${MINIO_ROOT_USER:-finstock_admin}:${MINIO_ROOT_PASSWORD}@minio:9000"
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      sleep 10;
      mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-finstock_admin} ${MINIO_ROOT_PASSWORD};
      echo 'Creating Delta Lake buckets...';
      mc mb --ignore-existing minio/finstock-bronze;
      mc mb --ignore-existing minio/finstock-silver;
      mc mb --ignore-existing minio/finstock-gold;
      mc mb --ignore-existing minio/finstock-checkpoints;
      mc mb --ignore-existing minio/finstock-logs;
      mc mb --ignore-existing minio/finstock-backups;
      echo 'Bucket policies: using authenticated access only (no anonymous).';
      echo 'Creating folder structure...';
      mc cp /dev/null minio/finstock-bronze/market_data/.keep;
      mc cp /dev/null minio/finstock-bronze/fundamentals/.keep;
      mc cp /dev/null minio/finstock-bronze/corporate_actions/.keep;
      mc cp /dev/null minio/finstock-bronze/news/.keep;
      mc cp /dev/null minio/finstock-silver/market_data_cleaned/.keep;
      mc cp /dev/null minio/finstock-silver/fundamentals_enriched/.keep;
      mc cp /dev/null minio/finstock-gold/market_analytics/.keep;
      mc cp /dev/null minio/finstock-gold/reports/.keep;
      echo 'MinIO Delta Lake storage initialized successfully';
      "
    networks:
      - finstock_network





  # PostgreSQL for metadata and configuration storage
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: finstock-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-finstock_metadata}
      POSTGRES_USER: ${POSTGRES_USER:-finstock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/00_set_airflow_password.sh:/docker-entrypoint-initdb.d/00_set_airflow_password.sh
      - ./config/postgres_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./config/init-timescaledb.sql:/docker-entrypoint-initdb.d/02_init_timescale.sql
    networks:
      - finstock_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finstock_user -d finstock_metadata"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Apache Airflow for workflow orchestration
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: finstock-airflow-webserver
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow_user:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      PYTHONPATH: /opt/airflow/src
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      airflow db init &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@finstock.com --password ${AIRFLOW_ADMIN_PASSWORD} || true &&
      airflow webserver
      "
    networks:
      - finstock_network

  # Airflow Scheduler - Executes DAGs on schedule
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: finstock-airflow-scheduler
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://airflow_user:${AIRFLOW_DB_PASSWORD}@postgres:5432/airflow_db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 30
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 30
      PYTHONPATH: /opt/airflow/src
      # PostgreSQL connection for DAG tasks
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-finstock_user}
      POSTGRES_DB: finstock_market_data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
    depends_on:
      postgres:
        condition: service_healthy
      airflow-webserver:
        condition: service_started
    command: airflow scheduler
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - finstock_network

  # VNStock Data Producer - Fetches market data from vnstock API
  vnstock-producer:
    build:
      context: .
      dockerfile: services/vnstock_producer/Dockerfile
    container_name: finstock-vnstock-producer
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_MARKET_DATA: market_data
      KAFKA_TOPIC_LOGS: logs
      LOG_LEVEL: INFO
      VNSTOCK_SYMBOLS: "VIC,VNM,HPG,VCB,FPT,GAS,BID,CTG,MSN,PLX"
      VNSTOCK_FETCH_INTERVAL: 60
      MARKET_START_HOUR: 9
      MARKET_END_HOUR: 15
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - finstock_network

  # TimescaleDB Consumer - Consumes market data and writes to TimescaleDB
  timescale-consumer:
    build:
      context: .
      dockerfile: services/timescale_consumer/Dockerfile
    container_name: finstock-timescale-consumer
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_MARKET_DATA: market_data
      KAFKA_TOPIC_INDICATORS: indicators
      KAFKA_TOPIC_LOGS: logs
      KAFKA_CONSUMER_GROUP: timescale_consumer_group
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: finstock_market_data
      POSTGRES_USER: ${POSTGRES_USER:-finstock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: INFO
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - finstock_network

  # Paper Trading Service - Executes trades based on signals
  paper-trading:
    build:
      context: .
      dockerfile: services/paper_trading/Dockerfile
    container_name: finstock-paper-trading
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_SIGNALS: signals
      KAFKA_TOPIC_ORDERS: orders
      KAFKA_TOPIC_RISK_EVENTS: risk_events
      KAFKA_TOPIC_LOGS: logs
      KAFKA_CONSUMER_GROUP: paper_trading_group
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: finstock_market_data
      POSTGRES_USER: ${POSTGRES_USER:-finstock_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      INITIAL_CAPITAL: 1000000000
      COMMISSION_RATE: 0.0015
      TAX_RATE: 0.001
      MAX_POSITION_SIZE: 0.1
      LOG_LEVEL: INFO
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - finstock_network

  # Grafana for monitoring and visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: finstock-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana_datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./config/grafana_dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboards:/var/lib/grafana/dashboards
    networks:
      - finstock_network



  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: finstock-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      ZOOKEEPER_SNAP_RETAIN_COUNT: 3
      ZOOKEEPER_PURGE_INTERVAL: 12
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - finstock_network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka broker for messaging
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: finstock-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      # JVM Settings for development
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
      KAFKA_JVM_PERFORMANCE_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"
      # Log retention settings
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 134217728
      # Compression
      KAFKA_COMPRESSION_TYPE: snappy
      # JMX for monitoring
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: localhost
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - finstock_network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:29092"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Kafka UI for management and monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finstock-kafka-ui
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finstock-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_JMXPORT: 9999
      # Enable JMX metrics
      KAFKA_CLUSTERS_0_METRICS_PORT: 9999
      # UI Configuration
      AUTH_TYPE: "DISABLED"
      MANAGEMENT_HEALTH_LDAP_ENABLED: false
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - finstock_network

